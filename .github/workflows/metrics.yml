name: Metrics

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.svg
          user: yetanotheraryan
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_theme: dark
          config_width: 480
